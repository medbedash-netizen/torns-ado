<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torns · Mobility ADO · Baix Llobregat</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--bg2:#16213e;--bg3:#0f3460;
  --panel:#1e1e2e;--panel2:#252535;--panel3:#2d2d45;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.13);
  --text:#e8e8f0;--text2:#a0a0b8;--text3:#6a6a88;
  --accent:#e86c1a;--accent2:#f59e0b;
  --blue:#3b82f6;--green:#22c55e;--purple:#a78bfa;--red:#f87171;
  --teal:#2dd4bf;--cyan:#67e8f9;
  --radius:8px;--radius-sm:5px;
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}

/* ── APP SHELL ── */
.app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:248px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--panel);border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;padding:0 18px;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.topbar h1{font-size:14px;font-weight:600;letter-spacing:-0.01em}
.topbar .sub{font-size:11px;color:var(--text3);margin-top:1px}
.search-wrap{position:relative}
.search-wrap input{background:var(--panel2);border:1px solid var(--border2);color:var(--text);font-size:12px;padding:6px 12px 6px 32px;border-radius:20px;width:200px;outline:none}
.search-wrap input:focus{border-color:var(--blue);background:var(--panel3)}
.search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* ── SIDEBAR ── */
.sidebar{background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;padding:14px 0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.filter-section{padding:0 14px 10px}
.filter-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.filter-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:4px 9px;border-radius:14px;border:1px solid var(--border2);background:var(--panel2);color:var(--text2);font-size:11px;font-weight:500;cursor:pointer;transition:all 0.12s;white-space:nowrap}
.chip:hover{background:var(--panel3);color:var(--text)}
.chip.active{background:var(--blue);border-color:var(--blue);color:#fff}
.chip.active-lab{background:#1d4ed8;border-color:#1d4ed8}
.chip.active-sm{background:#92400e;border-color:#b45309}
.chip.active-noc{background:#4c1d95;border-color:#6d28d9}

/* line chips with color dots */
.line-chip{display:flex;align-items:center;gap:4px;padding:3px 8px 3px 5px}
.line-chip .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.chip-totes{font-size:11px;font-weight:600}

/* ── TORNS LIST ── */
.section-header{padding:6px 14px 4px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;display:flex;align-items:center;justify-content:space-between}
.section-header .count{background:var(--panel3);border-radius:8px;padding:1px 6px;font-size:9px}
.torn-item{padding:9px 14px;cursor:pointer;border-left:2px solid transparent;transition:all 0.1s;display:flex;align-items:center;justify-content:space-between;gap:8px}
.torn-item:hover{background:var(--panel2)}
.torn-item.active{background:var(--panel2);border-left-color:var(--accent)}
.torn-item.hidden{display:none}
.torn-left{min-width:0;flex:1}
.torn-code{font-size:12px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:5px}
.torn-code .dot-tipus{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-O{background:#f59e0b}
.dot-R{background:#3b82f6}
.dot-N{background:#a78bfa}
.torn-blocs{font-size:10px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.torn-meta{font-size:10px;color:var(--text3);margin-top:1px}
.torn-arrow{color:var(--text3);font-size:10px}
.divider{height:1px;background:var(--border);margin:4px 0}

/* ── DETAIL PANEL ── */
.detail{overflow-y:auto;padding:24px 28px;background:var(--bg)}
.detail::-webkit-scrollbar{width:6px}
.detail::-webkit-scrollbar-track{background:transparent}
.detail::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);flex-direction:column;gap:8px}
.detail-empty .icon{font-size:40px;opacity:0.3}

.detail-header{margin-bottom:20px}
.detail-header .codi{font-size:28px;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.detail-header .ruta{font-size:15px;color:var(--text);margin-top:2px;font-weight:500}
.detail-header .tipus-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tipus-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.tb-lab{background:rgba(59,130,246,0.2);color:#93c5fd;border:1px solid rgba(59,130,246,0.3)}
.tb-dinv{background:rgba(167,139,250,0.15);color:#c4b5fd;border:1px solid rgba(167,139,250,0.25)}
.tb-dver{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.25)}
.tb-sinv{background:rgba(248,113,113,0.15);color:#fca5a5;border:1px solid rgba(248,113,113,0.25)}
.tb-sver{background:rgba(45,212,191,0.15);color:#99f6e4;border:1px solid rgba(45,212,191,0.25)}
.tb-tipus{background:rgba(245,158,11,0.2);color:#fcd34d;border:1px solid rgba(245,158,11,0.3)}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.kpi-box{background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 14px}
.kpi-box .lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.kpi-box .val{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1}
.kpi-box .sub{font-size:10px;color:var(--text3);margin-top:3px}

.blocs-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.bloc-chip{padding:5px 12px;background:var(--panel2);border:1px solid var(--border2);border-radius:6px;font-size:12px;font-variant-numeric:tabular-nums;color:var(--text2)}
.bloc-chip:first-child{border-color:rgba(245,158,11,0.4);color:#fcd34d;background:rgba(245,158,11,0.1)}
.bloc-chip:nth-child(2){border-color:rgba(59,130,246,0.4);color:#93c5fd;background:rgba(59,130,246,0.1)}

/* ── EXPEDICIONS ── */
.exp-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.exp-section-title .tag{font-size:10px;font-weight:600;padding:1px 8px;border-radius:10px;background:var(--panel2);color:var(--text3);border:1px solid var(--border2)}
.exp-table{background:var(--panel);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;font-size:12px}
.exp-row{display:grid;grid-template-columns:52px 52px 100px 1fr 90px;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);transition:background 0.1s}
.exp-row:last-child{border-bottom:none}
.exp-row:hover{background:var(--panel2)}
.exp-row.is-descanso{background:rgba(245,158,11,0.04)}
.exp-row.is-descanso .h-col{color:var(--accent2);opacity:0.7}
.exp-row.is-descanso .dt-col{color:var(--accent2);opacity:0.7;font-style:italic}
.exp-row.is-sortida,.exp-row.is-entrada{opacity:0.55}
.exp-row.is-posicionament{opacity:0.45}
.h-col{font-weight:700;font-variant-numeric:tabular-nums;color:var(--text)}
.ha-col{font-variant-numeric:tabular-nums;color:var(--text3)}
.tr-col{font-size:11px;font-weight:600;color:var(--teal)}
.dt-col{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ref-col{font-size:11px;font-weight:600;text-align:right}
.ref-col.is-sm{color:var(--blue)}
.ref-col.is-relevo{color:var(--accent)}
.ref-col.is-vuelta{color:var(--green)}
.pill-buit{display:inline-block;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,0.06);color:var(--text3);font-size:10px}

/* ── SCROLLBAR HIDE ── */
.sidebar,detail{scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
</style>
</head>

<!-- TOPBAR -->

      <div class="topbar h1" style="font-size:14px;font-weight:600">Torns</div>

  <!-- TIPUS TORN -->

      <span class="chip" data-torn="SM" onclick="setTorn('SM',this)">SM / JP</span>
    </div>
  </div>

  <div class="divider" style="margin:6px 0"></div>

  <!-- TORN LIST -->
  <div id="tornList"></div>
</aside>

<!-- DETAIL -->
<main class="detail" id="detailPanel">
  <div class="detail-empty">
    <div class="icon">🚌</div>
    <div>Selecciona un torn per veure els detalls</div>
  </div>
</main>

/* ── LINE COLORS ── */
const LINE_COLORS = {
  CF1:'#e86c1a',CF2:'#f59e0b',GA1:'#22c55e',
  JP:'#94a3b8',
  L80:'#3b82f6',L82:'#6366f1',L85:'#8b5cf6',L86:'#a78bfa',
  L88:'#06b6d4',L94:'#0ea5e9',L95:'#38bdf8',L96:'#7dd3fc',
  L97:'#67e8f9',L99:'#2dd4bf',
  N12:'#a78bfa',N13:'#c084fc',N14:'#e879f9',N15:'#f0abfc',
  N16:'#818cf8',N17:'#6366f1',N18:'#4f46e5',N19:'#4338ca',N20:'#3730a3',
  PAR:'#6b7280',R94:'#d97706',SM:'#f59e0b',
  VB1:'#84cc16',VB2:'#a3e635',
  X80:'#f87171',X86:'#fb923c',X95:'#fbbf24',X97:'#86efac',
};
function lineColor(l){return LINE_COLORS[l]||'#6b7280';}

/* ── BUILD LINE CHIPS ── */
const lines = [...new Set(TORNS.map(t=>t.l))].sort();
const chipsLinia = document.getElementById('chips-linia');
lines.forEach(l=>{
  const c = lineColor(l);
  const sp = document.createElement('span');
  sp.className='chip line-chip';
  sp.dataset.linia=l;
  sp.innerHTML=`<span class="dot" style="background:${c}"></span>${l}`;
  sp.onclick=()=>setLinia(l,sp);
  chipsLinia.appendChild(sp);
});

/* ── STATE ── */
let activeDia='Tots', activeLinia='Totes', activeTorn='Tots', activeSearch='', selectedCodi=null;

function setDia(v,el){
  activeDia=v;
  document.querySelectorAll('[data-dia]').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function setLinia(v,el){
  activeLinia=v;
  document.querySelectorAll('[data-linia]').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function setTorn(v,el){
  activeTorn=v;
  document.querySelectorAll('[data-torn]').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

/* ── FILTER ── */
function matchesTorn(t){
  if(activeTorn==='Tots') return true;
  if(activeTorn==='SM') return t.l==='SM'||t.l==='JP';
  if(activeTorn==='N') return t.tt==='N';
  return t.tt===activeTorn;
}
function matchesDia(t){
  if(activeDia==='Tots') return true;
  return t.td.includes(activeDia);
}
function matchesLinia(t){
  if(activeLinia==='Totes') return true;
  return t.l===activeLinia;
}
function matchesSearch(t){
  if(!activeSearch) return true;
  const q=activeSearch.toLowerCase();
  return t.c.toLowerCase().includes(q)||t.l.toLowerCase().includes(q)||(t.rt||'').toLowerCase().includes(q);
}

function applyFilters(){
  activeSearch=document.getElementById('searchInput').value;
  const groups={};
  TORNS.forEach(t=>{
    if(matchesDia(t)&&matchesLinia(t)&&matchesTorn(t)&&matchesSearch(t)){
      if(!groups[t.l]) groups[t.l]=[];
      groups[t.l].push(t);
    }
  });
  renderList(groups);
}

/* ── RENDER LIST ── */
function renderList(groups){
  const list=document.getElementById('tornList');
  list.innerHTML='';
  const sortedLines=Object.keys(groups).sort();
  if(sortedLines.length===0){
    list.innerHTML='<div style="padding:20px 14px;color:var(--text3);font-size:12px">Cap torn trobat</div>';
    return;
  }
  sortedLines.forEach(l=>{
    const torns=groups[l];
    const header=document.createElement('div');
    header.className='section-header';
    header.innerHTML=`<span style="color:${lineColor(l)};font-weight:700">${l}</span><span class="count">${torns.length}</span>`;
    list.appendChild(header);
    torns.forEach(t=>{
      const item=document.createElement('div');
      item.className='torn-item'+(selectedCodi===t.c?' active':'');
      item.dataset.codi=t.c;
      const blocsStr=t.bl.join(' | ');
      const tornLabel=t.tt==='O'?'Origen':'(t.tt===\'R\'?\'Relevo\':\'Nocturn\')';
      item.innerHTML=`
        <div class="torn-left">
          <div class="torn-code"><span class="dot-tipus dot-${t.tt}"></span>${t.c}</div>
          <div class="torn-blocs">${blocsStr||'—'}</div>
          <div class="torn-meta">${t.hi} → ${t.hf} &middot; ${t.ns} exp</div>
        </div>
        <div class="torn-arrow">›</div>`;
      item.onclick=()=>selectTorn(t.c);
      list.appendChild(item);
    });
    const div=document.createElement('div');div.className='divider';
    list.appendChild(div);
  });
}

/* ── SELECT TORN ── */
function selectTorn(codi){
  selectedCodi=codi;
  document.querySelectorAll('.torn-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.codi===codi);
  });
  const t=TORNS.find(x=>x.c===codi);
  if(!t) return;
  renderDetail(t);
}

/* ── TIPO DIA BADGE ── */
const DIA_MAP={
  'D INV':['tb-dinv','Laborables Hivern'],
  'D VER':['tb-dver','Laborables Estiu'],
  'S INV':['tb-sinv','Dissabtes Hivern'],
  'S VER':['tb-sver','Dissabtes Estiu'],
  'LMJV LAB VER NO AGO VB4':['tb-lab','Laborables L/M/J/V · Estiu (no agost)'],
  'Refuerzo Verano L94 playa':['tb-sver','Reforç Estiu Platja'],
};
function diadBadge(td){
  const [cls,label]=DIA_MAP[td]||['tb-lab',td];
  return `<span class="tipus-badge ${cls}">${label}</span>`;
}

/* ── RENDER DETAIL ── */
function renderDetail(t){
  const color=lineColor(t.l);
  const tornLabel=t.tt==='O'?'Origen (matí)':t.tt==='R'?'Relevo (tarda)':'Nocturn';
  const diadesHtml = '';
  
  // Duration
  function toMin(h){
    if(!h||h==='--') return 0;
    const [hh,mm]=h.split(':').map(Number);return hh*60+(mm||0);
  }
  const dur=toMin(t.hf)-toMin(t.hi);
  const durStr=dur>0?`${Math.floor(dur/60)}h${String(dur%60).padStart(2,'0')}m`:'—';

  // Blocs chips
  const blocsHtml=t.bl.map(b=>`<span class="bloc-chip">${b}</span>`).join('');

  // Expedicions
  let expHtml='';
  t.ex.forEach(e=>{
    const rowCls=e.tp==='d'?'is-descanso':e.tp==='s'&&!e.tr?'is-sortida':e.tp==='e'?'is-entrada':e.tp==='p'?'is-posicionament':'';
    let refHtml='';
    const dt=e.dt||'';
    if(dt.toLowerCase().includes('→')||dt.includes('releva')||dt.includes('Releva')){
      refHtml=`<span class="ref-col is-relevo">→ relevo</span>`;
    } else if(dt.toLowerCase().includes('sm0')||dt.toLowerCase().includes('sm0')){
      refHtml=`<span class="ref-col is-sm">SM</span>`;
    } else if(e.tp==='d'){
      refHtml=`<span class="pill-buit">descanso</span>`;
    } else if(e.tp==='s'&&!e.tr){
      refHtml=`<span class="pill-buit">buit</span>`;
    } else if(e.tp==='p'){
      refHtml=`<span class="pill-buit">posic.</span>`;
    }
    // detect relay ref in detall
    const relMatch=dt.match(/→\s*(CF\w+|L\w+|SM\w+|N\w+)/);
    if(relMatch) refHtml=`<span class="ref-col is-relevo">→${relMatch[1]}</span>`;
    
    expHtml+=`<div class="exp-row ${rowCls}">
      <div class="h-col">${e.h}</div>
      <div class="ha-col">${e.ha}</div>
      <div class="tr-col">${e.tr||''}</div>
      <div class="dt-col" title="${dt}">${dt}</div>
      <div>${refHtml}</div>
    </div>`;
  });

  document.getElementById('detailPanel').innerHTML=`
    <div class="detail-header">
      <div class="codi" style="color:${color}">${t.c}</div>
      <div class="ruta">${t.l} — ${t.rt||'Ruta no disponible'}</div>
      <div class="tipus-badges">
        <span class="tipus-badge tb-tipus">${tornLabel}</span>
        ${diadesHtml}
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi-box"><div class="lbl">Inici</div><div class="val">${t.hi}</div><div class="sub">Sortida</div></div>
      <div class="kpi-box"><div class="lbl">Fi</div><div class="val">${t.hf}</div><div class="sub">Entrada</div></div>
      <div class="kpi-box"><div class="lbl">Durada</div><div class="val">${durStr}</div><div class="sub">&nbsp;</div></div>
      <div class="kpi-box"><div class="lbl">Expedicions</div><div class="val">${t.ns}</div><div class="sub">${t.nb} en buit</div></div>
    </div>

    ${blocsHtml?`<div class="blocs-row">${blocsHtml}</div>`:''}

    <div class="exp-section-title">
      Expedicions
      <span class="tag">${t.ns} serveis · ${t.nb} buit</span>
    </div>
    <div class="exp-table">${expHtml}</div>
  `;
}

/* ── INIT ── */
applyFilters();
// Auto-select first
if(TORNS.length) selectTorn(TORNS[0].c);
</script>
